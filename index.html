<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>POKÉDEX TCG — Collection Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #080810;
    --bg2: #0d0d18;
    --bg3: #111120;
    --border: #1e1e32;
    --border2: #2a2a44;
    --gold: #c8a96e;
    --gold2: #e8c98e;
    --green: #5cbe8c;
    --red: #e06060;
    --text: #d8d0c8;
    --text2: #888;
    --text3: #444;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  /* Header */
  #header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,8,16,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  #logo { font-family: var(--sans); font-weight: 700; font-size: 15px; letter-spacing: 0.25em; color: var(--gold); flex-shrink: 0; }
  #progress-wrap { flex: 1; min-width: 100px; }
  #progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  #progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  #progress-text { font-size: 10px; color: var(--text2); margin-top: 3px; letter-spacing: 0.1em; }
  #nav { display: flex; gap: 5px; flex-shrink: 0; }
  .nav-btn { padding: 5px 10px; font-size: 10px; letter-spacing: 0.15em; font-family: var(--mono); background: transparent; color: var(--text2); border: 1px solid var(--border); border-radius: 2px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .nav-btn.active, .nav-btn:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  #add-btn { padding: 6px 12px; font-size: 10px; letter-spacing: 0.15em; font-family: var(--mono); background: var(--bg3); color: var(--gold); border: 1px solid var(--border2); border-radius: 2px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  #add-btn:hover { background: var(--gold); color: var(--bg); border-color: var(--gold); }

  /* Search */
  #search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 40; background: rgba(8,8,16,0.92); backdrop-filter: blur(10px); }
  #search { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; letter-spacing: 0.08em; }
  #search:focus { border-color: var(--gold); }

  /* Grid */
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 7px; padding: 12px; }
  .poke-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 7px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: all 0.15s; position: relative; }
  .poke-card:hover { transform: translateY(-2px); border-color: var(--border2); }
  .poke-card.owned { background: #0d1810; border-color: #253525; box-shadow: 0 0 10px rgba(92,190,140,0.06); }
  .poke-card.owned:hover { border-color: #3a6a4a; box-shadow: 0 4px 18px rgba(92,190,140,0.12); }
  .poke-num { font-size: 8px; color: var(--text3); letter-spacing: 0.12em; margin-bottom: 3px; }
  .poke-sprite { width: 52px; height: 52px; object-fit: contain; transition: filter 0.2s; }
  .poke-sprite.locked { filter: grayscale(1) brightness(0.65); }
  .poke-name { font-size: 8px; margin-top: 3px; text-align: center; letter-spacing: 0.04em; color: var(--text2); line-height: 1.3; }
  .poke-name.owned { color: #a8c8a8; }
  .owned-dot { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .sprite-placeholder { width: 52px; height: 52px; background: var(--bg3); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; opacity: 0.3; }

  /* Modal */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: center; justify-content: center; padding: 12px; backdrop-filter: blur(5px); }
  #modal-overlay.open { display: flex; }
  #modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; width: 100%; max-width: 700px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
  #modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  #modal-title { font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 0.15em; }
  #modal-sub { font-size: 9px; color: var(--text2); letter-spacing: 0.12em; margin-bottom: 4px; }
  #modal-owned-count { font-size: 10px; color: var(--text2); margin-top: 4px; letter-spacing: 0.08em; }
  #modal-header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  #modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px; }
  #modal-close:hover { color: var(--text); }
  #modal-body { padding: 14px; overflow-y: auto; flex: 1; }
  #printings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 9px; }
  .printing { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.15s; position: relative; opacity: 0.72; }
  .printing.owned { opacity: 1; background: #0c1810; border-color: #253525; }
  .printing.owned:hover { transform: translateY(-2px); border-color: #3a5a3a; }
  .printing.is-display { border-color: var(--gold) !important; }
  .printing:not(.owned):hover { opacity: 0.65; }
  .printing img { width: 100%; aspect-ratio: 2.5/3.5; object-fit: contain; border-radius: 3px; }
  .printing img.locked-img { filter: grayscale(1) brightness(0.6); }
  .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%); font-size: 20px; opacity: 0.5; pointer-events: none; }
  .display-badge { position: absolute; top: 4px; left: 4px; font-size: 7px; background: var(--gold); color: var(--bg); padding: 1px 4px; border-radius: 2px; letter-spacing: 0.1em; font-family: var(--mono); }
  .printing-name { font-size: 8px; margin-top: 5px; text-align: center; color: var(--text2); line-height: 1.3; }
  .printing-set { font-size: 7px; color: var(--text3); text-align: center; margin-top: 2px; }
  .remove-btn { font-size: 7px; background: none; border: none; color: var(--red); cursor: pointer; margin-top: 3px; letter-spacing: 0.1em; font-family: var(--mono); }
  .remove-btn:hover { text-decoration: underline; }
  #modal-loading { text-align: center; padding: 48px; color: var(--text3); letter-spacing: 0.15em; font-size: 11px; }
  .no-card-img { width: 100%; aspect-ratio: 2.5/3.5; background: var(--bg); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 28px; opacity: 0.2; }

  /* Confirm modal */
  #confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(6px); }
  #confirm-overlay.open { display: flex; }
  #confirm-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; width: 100%; max-width: 320px; overflow: hidden; }
  #confirm-card-img { width: 100%; aspect-ratio: 2.5/3.5; object-fit: contain; display: block; padding: 16px 32px 8px; background: var(--bg); }
  #confirm-card-img-placeholder { width: 100%; aspect-ratio: 2.5/3.5; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 48px; opacity: 0.2; }
  #confirm-body { padding: 14px 18px 18px; }
  #confirm-card-name { font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 0.1em; margin-bottom: 3px; }
  #confirm-card-set { font-size: 10px; color: var(--text2); letter-spacing: 0.1em; margin-bottom: 16px; }
  #confirm-actions { display: flex; gap: 8px; }

  /* Add Card overlay */
  #add-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; align-items: flex-start; justify-content: center; padding: 60px 16px 16px; backdrop-filter: blur(5px); }
  #add-overlay.open { display: flex; }
  #add-modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; width: 100%; max-width: 520px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
  #add-modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  #add-modal-title { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--gold); letter-spacing: 0.2em; }
  #add-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
  #add-search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  #add-search { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; }
  #add-search:focus { border-color: var(--gold); }
  #add-search-btn { padding: 8px 14px; font-size: 10px; letter-spacing: 0.12em; font-family: var(--mono); background: var(--gold); color: var(--bg); border: none; border-radius: 3px; cursor: pointer; white-space: nowrap; }
  #add-search-btn:hover { background: var(--gold2); }
  #add-results { padding: 12px 16px; overflow-y: auto; flex: 1; }
  #add-status { font-size: 10px; color: var(--text2); letter-spacing: 0.12em; text-align: center; padding: 32px 0; }
  .add-result-pokemon { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; margin-bottom: 6px; transition: all 0.15s; }
  .add-result-pokemon:hover { background: var(--bg3); border-color: var(--border2); }
  .add-result-pokemon img { width: 40px; height: 40px; object-fit: contain; }
  .add-result-pokemon-name { font-size: 12px; color: var(--text); letter-spacing: 0.08em; }
  .add-result-pokemon-num { font-size: 9px; color: var(--text3); letter-spacing: 0.1em; }
  /* Printings picker inside add flow */
  #add-printings-wrap { padding: 0 16px 16px; overflow-y: auto; flex: 1; }
  #add-back { background: none; border: none; color: var(--text2); font-size: 10px; letter-spacing: 0.15em; cursor: pointer; padding: 10px 0; display: block; }
  #add-back:hover { color: var(--text); }
  #add-printings-title { font-size: 11px; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 10px; }
  #add-printings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }

  /* Binder */
  #binder-view { padding: 18px; display: none; }
  #binder-view.active { display: block; }
  .view-section { display: none; }
  .view-section.active { display: block; }
  .section-title { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .binder-controls { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .binder-control { display: flex; flex-direction: column; gap: 5px; }
  .binder-label { font-size: 10px; color: var(--text2); letter-spacing: 0.15em; }
  .binder-select { background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 6px 10px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; cursor: pointer; }
  .binder-info { font-size: 10px; color: var(--text2); letter-spacing: 0.1em; align-self: flex-end; padding-bottom: 7px; }
  #binder-table-wrap { overflow-x: auto; }
  #binder-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  #binder-table th { padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); letter-spacing: 0.12em; text-align: left; font-family: var(--mono); font-weight: normal; }
  #binder-table td { padding: 6px 12px; border: 1px solid var(--border); }
  #binder-table tr:nth-child(even) td { background: var(--bg2); }

  /* Settings */
  #settings-view { padding: 20px; max-width: 560px; display: none; }
  #settings-view.active { display: block; }
  .settings-label { font-size: 10px; letter-spacing: 0.15em; color: var(--text2); margin-bottom: 6px; display: block; }
  .settings-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; margin-bottom: 14px; }
  .settings-input:focus { border-color: var(--gold); }
  .btn-primary { padding: 10px 22px; font-size: 10px; letter-spacing: 0.18em; font-family: var(--mono); background: var(--gold); color: var(--bg); border: none; border-radius: 3px; cursor: pointer; text-transform: uppercase; margin-right: 10px; transition: all 0.15s; }
  .btn-primary:hover { background: var(--gold2); }
  .btn-secondary { padding: 10px 22px; font-size: 10px; letter-spacing: 0.18em; font-family: var(--mono); background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: 3px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { padding: 10px 22px; font-size: 10px; letter-spacing: 0.18em; font-family: var(--mono); background: transparent; color: var(--red); border: 1px solid var(--red); border-radius: 3px; cursor: pointer; text-transform: uppercase; transition: all 0.15s; }
  .btn-danger:hover { background: rgba(224,96,96,0.1); }
  .stats-row { font-size: 11px; color: var(--text2); letter-spacing: 0.1em; line-height: 2.2; }
  .stats-val { color: var(--gold); }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 20px; z-index: 999; padding: 10px 18px; border-radius: 4px; font-size: 10px; letter-spacing: 0.12em; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { background: #0d1e14; border: 1px solid var(--green); color: var(--green); }
  #toast.error { background: #1e0d0d; border: 1px solid var(--red); color: var(--red); }

  /* Loading spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scan line animation */
  #scan-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanLine 2s linear infinite; opacity: 0.7; }
  @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

  /* Empty state */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text3); font-size: 11px; letter-spacing: 0.15em; }

  /* Sets view */
  #sets-view { display: none; }
  #sets-view.active { display: block; }
  #sets-search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 40; background: rgba(8,8,16,0.92); backdrop-filter: blur(10px); display: flex; gap: 8px; align-items: center; }
  #sets-search { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; letter-spacing: 0.08em; }
  #sets-search:focus { border-color: var(--gold); }
  #sets-show-hidden-btn { padding: 5px 10px; font-size: 9px; letter-spacing: 0.12em; font-family: var(--mono); background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 2px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  #sets-show-hidden-btn.active { color: var(--gold); border-color: var(--gold); }
  #sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 14px; }
  .set-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative; }
  .set-card:hover { transform: translateY(-2px); border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .set-card.complete { border-color: #2a4a3a; box-shadow: 0 0 10px rgba(92,190,140,0.08); }
  .set-card.pinned { border-color: var(--gold) !important; }
  .set-card-logo-wrap { height: 70px; background: var(--bg3); display: flex; align-items: center; justify-content: center; padding: 10px; position: relative; }
  .set-card-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
  .set-card-logo-placeholder { font-size: 28px; opacity: 0.2; }
  .set-pin-btn { position: absolute; top: 5px; left: 5px; background: rgba(8,8,16,0.8); border: 1px solid var(--border2); border-radius: 2px; color: var(--text3); font-size: 10px; cursor: pointer; padding: 2px 5px; line-height: 1; transition: all 0.15s; }
  .set-pin-btn:hover, .set-pin-btn.pinned { color: var(--gold); border-color: var(--gold); }
  .set-hide-btn { position: absolute; top: 5px; right: 5px; background: rgba(8,8,16,0.8); border: 1px solid var(--border2); border-radius: 2px; color: var(--text3); font-size: 10px; cursor: pointer; padding: 2px 5px; line-height: 1; transition: all 0.15s; }
  .set-hide-btn:hover { color: var(--red); border-color: var(--red); }
  .set-card-body { padding: 8px 10px 10px; }
  .set-card-name { font-size: 10px; color: var(--text); letter-spacing: 0.06em; line-height: 1.3; margin-bottom: 4px; }
  .set-card-meta { font-size: 8px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 6px; }
  .set-progress-bar { height: 3px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
  .set-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #8be8b8); border-radius: 2px; transition: width 0.4s ease; }
  .set-progress-text { font-size: 8px; color: var(--text2); letter-spacing: 0.08em; display: flex; justify-content: space-between; align-items: center; }
  .set-complete-badge { font-size: 7px; color: var(--green); letter-spacing: 0.12em; }
  .set-pinned-badge { position: absolute; bottom: 5px; right: 8px; font-size: 7px; color: var(--gold); letter-spacing: 0.1em; }

  /* Set detail view */
  #set-detail { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 80; flex-direction: column; overflow: hidden; }
  #set-detail.open { display: flex; }
  #set-detail-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(8,8,16,0.96); flex-shrink: 0; }
  #set-detail-back { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 2px 8px 2px 0; }
  #set-detail-back:hover { color: var(--text); }
  #set-detail-logo { height: 36px; object-fit: contain; }
  #set-detail-info { flex: 1; }
  #set-detail-name { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--gold); letter-spacing: 0.15em; }
  #set-detail-meta { font-size: 9px; color: var(--text2); letter-spacing: 0.1em; margin-top: 1px; }
  #set-detail-progress-wrap { flex-shrink: 0; text-align: right; }
  #set-detail-progress-text { font-size: 11px; color: var(--text); letter-spacing: 0.1em; }
  #set-detail-pct { font-size: 9px; color: var(--text2); }
  #set-detail-bar-wrap { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 4px; width: 80px; }
  #set-detail-bar { height: 100%; background: linear-gradient(90deg, var(--green), #8be8b8); border-radius: 2px; transition: width 0.4s; }
  #set-detail-cards { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; align-content: start; }
  .set-card-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 7px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: all 0.15s; position: relative; }
  .set-card-item.owned { background: #0c1810; border-color: #253525; }
  .set-card-item:hover { transform: translateY(-2px); }
  .set-card-item.owned:hover { border-color: #3a5a3a; }
  .set-card-item img { width: 100%; aspect-ratio: 2.5/3.5; object-fit: contain; border-radius: 3px; }
  .set-card-item img.locked-img { filter: grayscale(1) brightness(0.6); }
  .set-card-item-num { font-size: 8px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 3px; }
  .set-card-item-name { font-size: 8px; color: var(--text2); text-align: center; margin-top: 4px; line-height: 1.3; }
  .set-card-item.owned .set-card-item-name { color: #a8c8a8; }
  .set-owned-dot { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .set-lock { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -65%); font-size: 16px; opacity: 0.4; pointer-events: none; }
  .set-remove-btn { font-size: 7px; background: none; border: none; color: var(--red); cursor: pointer; margin-top: 3px; letter-spacing: 0.1em; font-family: var(--mono); }

  @media (max-width: 400px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 5px; padding: 8px; }
    .poke-sprite { width: 42px; height: 42px; }
    .sprite-placeholder { width: 42px; height: 42px; }
    #sets-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; padding: 10px; }
    #set-detail-cards { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="logo">POKÉDEX TCG</div>
  <div id="progress-wrap">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">0 / 1025</div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="switchView('dex')">DEX</button>
    <button class="nav-btn" onclick="switchView('sets')">SETS</button>
    <button class="nav-btn" onclick="switchView('binder')">BINDER</button>
    <button class="nav-btn" onclick="switchView('settings')">⚙</button>

  <button id="add-btn" onclick="openAddCard()">+ ADD CARD</button>
</div>

<!-- Dex View -->
<div id="dex-view" class="view-section active">
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search by name or number..." oninput="renderGrid()"/>
  </div>
  <div id="grid"></div>
</div>

<!-- Sets View -->
<div id="sets-view" class="view-section">
  <div id="sets-search-wrap">
    <input id="sets-search" type="text" placeholder="Search sets..." oninput="renderSetsGrid()"/>
    <button id="sets-show-hidden-btn" onclick="toggleShowHidden()">SHOW HIDDEN</button>
  </div>
  <div id="sets-grid"></div>
</div>

<!-- Set Detail Panel -->
<div id="set-detail">
  <div id="set-detail-header">
    <button id="set-detail-back" onclick="closeSetDetail()">←</button>
    <img id="set-detail-logo" src="" alt="" onerror="this.style.display='none'"/>
    <div id="set-detail-info">
      <div id="set-detail-name"></div>
      <div id="set-detail-meta"></div>
    </div>
    <div id="set-detail-progress-wrap">
      <div id="set-detail-progress-text"></div>
      <div id="set-detail-pct"></div>
      <div id="set-detail-bar-wrap"><div id="set-detail-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div id="set-detail-cards"></div>
</div>


<div id="binder-view" class="view-section">
  <div class="section-title">BINDER CALCULATOR</div>
  <div class="binder-controls">
    <div class="binder-control">
      <span class="binder-label">COLUMNS</span>
      <select class="binder-select" id="binder-cols" onchange="renderBinder()">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="binder-control">
      <span class="binder-label">ROWS</span>
      <select class="binder-select" id="binder-rows" onchange="renderBinder()">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="binder-info" id="binder-info">3×3 = 9 cards/page</div>
  </div>
  <div id="binder-table-wrap">
    <table id="binder-table">
      <thead><tr><th>#</th><th>POKÉMON</th><th>OWNED</th><th>PAGE</th><th>SLOT</th></tr></thead>
      <tbody id="binder-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Settings View -->
<div id="settings-view" class="view-section">
  <div class="section-title">API CONFIGURATION</div>
  <label class="settings-label">POKÉMON TCG API KEY — get free key at dev.pokemontcg.io</label>
  <input class="settings-input" id="api-key-input" type="text" placeholder="Paste key here..."/>
  <button class="btn-primary" onclick="saveApiKey()">SAVE KEY</button>

  <div style="margin-top:28px">
    <div class="section-title">EXPORT</div>
    <button class="btn-primary" onclick="exportCSV()">EXPORT CSV</button>
    <button class="btn-secondary" onclick="exportJSON()">EXPORT JSON</button>
  </div>

  <div style="margin-top:28px">
    <div class="section-title">STATS</div>
    <div class="stats-row" id="stats-display"></div>
  </div>

  <div style="margin-top:28px">
    <div class="section-title">DANGER ZONE</div>
    <button class="btn-danger" onclick="resetCollection()">RESET COLLECTION</button>
  </div>
</div>

<!-- Pokémon Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <div id="modal-header">
      <div>
        <div id="modal-sub"></div>
        <div id="modal-title"></div>
        <div id="modal-owned-count"></div>
      </div>
      <div id="modal-header-actions">
        <button class="btn-primary" style="font-size:9px;padding:6px 12px" onclick="quickAddLatest()">+ ADD LATEST</button>
        <button id="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div id="modal-body">
      <div id="modal-loading"></div>
      <div id="printings-grid"></div>
    </div>
  </div>
</div>

<!-- Confirm Add Modal -->
<div id="confirm-overlay">
  <div id="confirm-modal">
    <img id="confirm-card-img" src="" alt=""/>
    <div id="confirm-card-img-placeholder" style="display:none">🃏</div>
    <div id="confirm-body">
      <div id="confirm-card-name"></div>
      <div id="confirm-card-set"></div>
      <div id="confirm-actions">
        <button class="btn-primary" style="flex:1" onclick="confirmAdd()">ADD TO COLLECTION</button>
        <button class="btn-secondary" onclick="closeConfirm()">CANCEL</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Card Overlay -->
<div id="add-overlay" onclick="closeAddCard(event)">
  <div id="add-modal">
    <div id="add-modal-header">
      <span id="add-modal-title">ADD CARD</span>
      <button id="add-close" onclick="closeAddCard()">✕</button>
    </div>
    <div id="add-search-wrap" style="flex-direction:column;gap:6px">
      <div style="display:flex;gap:8px">
        <input id="add-search" type="text" placeholder="Pokémon name..." onkeydown="if(event.key==='Enter')searchAddCard()" style="flex:1"/>
        <input id="add-card-number" type="text" placeholder="Card no. e.g. 058/094" onkeydown="if(event.key==='Enter')searchAddCard()" style="width:160px;background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none"/>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:9px;color:var(--text3);letter-spacing:.1em">Name searches your Pokédex. Card number searches the TCG API directly.</span>
        <button id="add-search-btn" onclick="searchAddCard()" style="margin-left:auto;flex-shrink:0">SEARCH</button>
      </div>
    </div>
    <div id="add-results">
      <div id="add-status">Search for a Pokémon to add a card</div>
    </div>
    <div id="add-printings-wrap" style="display:none">
      <button id="add-back" onclick="showAddResults()">← BACK TO RESULTS</button>
      <div id="add-printings-title"></div>
      <div id="add-printings-grid"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'sgc_pokedex_v2';
const API_KEY_STORAGE = 'sgc_pokemon_api_key';
const TOTAL = 1025;
const TCG_BASE = 'https://api.pokemontcg.io/v2';
const POKEAPI_BASE = 'https://pokeapi.co/api/v2';

let collection = {};
let apiKey = '';
let pokemonList = []; // [{id, name, sprite}]
let currentPokemon = null;
let currentView = 'dex';

function loadData() {
  try { collection = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { collection = {}; }
  apiKey = localStorage.getItem(API_KEY_STORAGE) || '';
  document.getElementById('api-key-input').value = apiKey;
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); }

// ── Collection helpers ───────────────────────────────────────────────────────
function getOwned(id) { return collection[id]?.owned || []; }
function getDisplay(id) { return collection[id]?.display || null; }
function isOwned(id) { return getOwned(id).length > 0; }
function ownedCount() { return pokemonList.filter(p => isOwned(p.id)).length; }

function addCard(pokeId, card) {
  if (!collection[pokeId]) collection[pokeId] = { owned: [], display: null };
  if (collection[pokeId].owned.find(c => c.id === card.id)) return false;
  collection[pokeId].owned.push(card);
  if (!collection[pokeId].display) collection[pokeId].display = card.id;
  saveData();
  return true;
}
function setDisplay(pokeId, cardId) {
  if (!collection[pokeId]) return;
  collection[pokeId].display = cardId;
  saveData();
}
function removeCard(pokeId, cardId) {
  if (!collection[pokeId]) return;
  collection[pokeId].owned = collection[pokeId].owned.filter(c => c.id !== cardId);
  if (collection[pokeId].display === cardId)
    collection[pokeId].display = collection[pokeId].owned[0]?.id || null;
  saveData();
}

// ── Progress ─────────────────────────────────────────────────────────────────
function updateProgress() {
  const owned = ownedCount();
  const pct = TOTAL > 0 ? (owned / TOTAL) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = owned + ' / ' + TOTAL;
}

// ── Views ────────────────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  const viewEl = document.getElementById(v + '-view');
  if (viewEl) viewEl.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(btn => {
    if (btn.getAttribute('onclick').includes("'" + v + "'")) btn.classList.add('active');
  });
  if (v === 'binder') renderBinder();
  if (v === 'settings') renderStats();
  if (v === 'dex') renderGrid();
  if (v === 'sets') {
    if (allSets.length === 0) loadAllSets();
    else renderSetsGrid();
  }
}

// ── Grid ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = pokemonList.filter(p =>
    p.name.toLowerCase().includes(q) || String(p.id).includes(q)
  );
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">NO RESULTS FOUND</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const owned = isOwned(p.id);
    const dispId = getDisplay(p.id);
    const dispCard = owned ? (getOwned(p.id).find(c => c.id === dispId) || getOwned(p.id)[0]) : null;
    const imgSrc = dispCard?.image || p.sprite;
    const imgClass = owned ? '' : 'locked';
    return `<div class="poke-card ${owned ? 'owned' : ''}" onclick="openModal(${p.id})">
      ${owned ? '<div class="owned-dot"></div>' : ''}
      <div class="poke-num">#${String(p.id).padStart(4,'0')}</div>
      ${imgSrc
        ? `<img class="poke-sprite ${imgClass}" src="${imgSrc}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="sprite-placeholder">◆</div>`}
      <div class="poke-name ${owned ? 'owned' : ''}">${p.name}</div>
    </div>`;
  }).join('');
  updateProgress();
}

// ── Modal ────────────────────────────────────────────────────────────────────
async function openModal(pokeId) {
  const p = pokemonList.find(x => x.id === pokeId);
  if (!p) return;
  currentPokemon = p;

  document.getElementById('modal-sub').textContent = '#' + String(p.id).padStart(4,'0');
  document.getElementById('modal-title').textContent = p.name.toUpperCase();
  document.getElementById('modal-owned-count').textContent = getOwned(p.id).length + ' printing(s) owned';
  document.getElementById('printings-grid').innerHTML = '';
  document.getElementById('modal-loading').innerHTML = '<div style="text-align:center;padding:48px;color:var(--text3);letter-spacing:.15em;font-size:11px"><span class="spinner"></span>LOADING PRINTINGS...</div>';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const name = p.name.split(' ')[0];
    const headers = {};
    if (apiKey) headers['X-Api-Key'] = apiKey;
    const res = await fetch(`${TCG_BASE}/cards?q=name:"${encodeURIComponent(name)}"&pageSize=250&orderBy=set.releaseDate`, { headers });
    const data = await res.json();
    const cards = data.data || [];
    document.getElementById('modal-loading').innerHTML = '';
    renderPrintings(p.id, cards);
  } catch {
    document.getElementById('modal-loading').innerHTML = '<div style="text-align:center;padding:48px;color:var(--red);font-size:11px;letter-spacing:.12em">Failed to load. Check API key or connection.</div>';
  }
}

function renderPrintings(pokeId, cards) {
  const ownedIds = new Set(getOwned(pokeId).map(c => c.id));
  const dispId = getDisplay(pokeId) || getOwned(pokeId)[0]?.id;
  document.getElementById('modal-owned-count').textContent = getOwned(pokeId).length + ' printing(s) owned';

  if (cards.length === 0) {
    document.getElementById('printings-grid').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);font-size:11px">No printings found in API.</div>';
    return;
  }
  document.getElementById('printings-grid').innerHTML = cards.map(card => {
    const owned = ownedIds.has(card.id);
    const isDisp = card.id === dispId;
    const img = card.images?.small;
    return `<div class="printing ${owned?'owned':''} ${isDisp?'is-display':''}" id="pr-${card.id}"
      onclick="${owned ? `setDisplayCard('${pokeId}','${card.id}')` : `markOwned('${pokeId}','${card.id}','${(card.name||'').replace(/'/g,"\\'")}','${img||''}','${(card.set?.name||'').replace(/'/g,"\\'")}','${card.number||''}')`}"
      title="${owned ? 'Click to set as display card' : 'Click to mark as owned'}">
      ${isDisp ? '<div class="display-badge">DISPLAY</div>' : ''}
      ${!owned ? '<div class="lock-icon">🔒</div>' : ''}
      ${img ? `<img src="${img}" alt="${card.name}" class="${owned?'':'locked-img'}" loading="lazy">` : `<div class="no-card-img">🃏</div>`}
      <div class="printing-name">${card.name}</div>
      <div class="printing-set">${card.set?.name||''} #${card.number||''}</div>
      ${owned ? `<button class="remove-btn" onclick="event.stopPropagation();removeCardModal('${pokeId}','${card.id}')">REMOVE</button>` : ''}
    </div>`;
  }).join('');
}

function setDisplayCard(pokeId, cardId) {
  setDisplay(pokeId, cardId);
  // Refresh display badges
  document.querySelectorAll('.printing').forEach(el => {
    el.classList.remove('is-display');
    const badge = el.querySelector('.display-badge');
    if (badge) badge.remove();
  });
  const el = document.getElementById('pr-' + cardId);
  if (el) {
    el.classList.add('is-display');
    el.insertAdjacentHTML('afterbegin', '<div class="display-badge">DISPLAY</div>');
  }
  renderGrid();
  showToast('Display card updated!', 'success');
}

// ── Confirm modal ─────────────────────────────────────────────────────────────
let pendingCard = null; // { pokeId, cardId, name, image, set, number, onConfirm }

function showConfirm(pokeId, cardId, name, image, set, number, onConfirm) {
  pendingCard = { pokeId, cardId, name, image, set, number, onConfirm };
  const imgEl = document.getElementById('confirm-card-img');
  const placeholder = document.getElementById('confirm-card-img-placeholder');
  if (image) {
    imgEl.src = image;
    imgEl.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    placeholder.style.display = 'flex';
  }
  document.getElementById('confirm-card-name').textContent = name;
  document.getElementById('confirm-card-set').textContent = set + (number ? '  •  #' + number : '');
  document.getElementById('confirm-overlay').classList.add('open');
}

function confirmAdd() {
  if (!pendingCard) return;
  const { pokeId, cardId, name, image, set, number, onConfirm } = pendingCard;
  if (pokeId) addCard(pokeId, { id: cardId, name, image, set, number });
  showToast(name + ' added!', 'success');
  renderGrid();
  // Refresh set detail if open
  if (currentSet && setCardsCache[currentSet.id]) {
    renderSetCards(currentSet, setCardsCache[currentSet.id]);
    updateSetDetailProgress(currentSet, setCardsCache[currentSet.id]);
    renderSetsGrid();
  }
  if (onConfirm) onConfirm(pokeId, cardId, name, image, set, number);
  closeConfirm();
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  pendingCard = null;
}

function markOwned(pokeId, cardId, name, image, set, number) {
  showConfirm(pokeId, cardId, name, image, set, number, (pid, cid, n, img, s, num) => {
    // Refresh the printing card in the modal
    const el = document.getElementById('pr-' + cid);
    if (el) {
      el.classList.add('owned');
      el.querySelector('.lock-icon')?.remove();
      const imgEl = el.querySelector('img');
      if (imgEl) imgEl.classList.remove('locked-img');
      el.setAttribute('onclick', `setDisplayCard('${pid}','${cid}')`);
      el.setAttribute('title', 'Click to set as display card');
      el.insertAdjacentHTML('beforeend', `<button class="remove-btn" onclick="event.stopPropagation();removeCardModal('${pid}','${cid}')">REMOVE</button>`);
    }
    document.getElementById('modal-owned-count').textContent = getOwned(pid).length + ' printing(s) owned';
  });
}

function removeCardModal(pokeId, cardId) {
  removeCard(pokeId, cardId);
  const el = document.getElementById('pr-' + cardId);
  if (el) {
    el.classList.remove('owned', 'is-display');
    el.querySelector('.display-badge')?.remove();
    el.querySelector('.remove-btn')?.remove();
    const img = el.querySelector('img');
    if (img) img.classList.add('locked-img');
    el.insertAdjacentHTML('afterbegin', '<div class="lock-icon">🔒</div>');
  }
  document.getElementById('modal-owned-count').textContent = getOwned(pokeId).length + ' printing(s) owned';
  renderGrid();
  showToast('Card removed', 'error');
}

async function quickAddLatest() {
  if (!currentPokemon) return;
  const p = currentPokemon;
  try {
    const headers = {}; if (apiKey) headers['X-Api-Key'] = apiKey;
    const res = await fetch(`${TCG_BASE}/cards?q=name:"${encodeURIComponent(p.name.split(' ')[0])}"&pageSize=1&orderBy=-set.releaseDate`, { headers });
    const data = await res.json();
    const card = data.data?.[0];
    if (card) {
      showConfirm(p.id, card.id, card.name, card.images?.small, card.set?.name, card.number, async () => {
        await openModal(p.id);
      });
    } else { showToast('No card found in API', 'error'); }
  } catch { showToast('Failed to fetch card', 'error'); }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay') && e.type !== 'click') return;
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  _closeModal();
}
function _closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentPokemon = null;
}
document.getElementById('modal-close').addEventListener('click', _closeModal);

// ── Add Card flow ─────────────────────────────────────────────────────────────
let addCardTarget = null; // pokemon object when showing printings

function openAddCard() {
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('add-search').value = '';
  document.getElementById('add-card-number').value = '';
  document.getElementById('add-status').textContent = 'Search for a Pokémon to add a card';
  document.getElementById('add-results').style.display = 'block';
  document.getElementById('add-printings-wrap').style.display = 'none';
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('add-search').focus(), 100);
}

function closeAddCard(e) {
  if (e && e.target !== document.getElementById('add-overlay')) return;
  _closeAddCard();
}
function _closeAddCard() {
  document.getElementById('add-overlay').classList.remove('open');
  document.body.style.overflow = '';
  addCardTarget = null;
}
document.getElementById('add-close').addEventListener('click', _closeAddCard);

async function searchAddCard() {
  const q = document.getElementById('add-search').value.trim().toLowerCase();
  const cardNum = document.getElementById('add-card-number').value.trim();
  const resultsEl = document.getElementById('add-results');

  // Card number search — goes straight to TCG API
  if (cardNum) {
    document.getElementById('add-status').innerHTML = '<span class="spinner"></span>SEARCHING BY CARD NUMBER...';
    resultsEl.innerHTML = document.getElementById('add-status').outerHTML;
    try {
      const headers = {}; if (apiKey) headers['X-Api-Key'] = apiKey;
      // number field in API uses just the number part e.g. "058" or "4"
      const numPart = cardNum.includes('/') ? cardNum.split('/')[0].replace(/^0+/,'') : cardNum.replace(/^0+/,'');
      const res = await fetch(`${TCG_BASE}/cards?q=number:${encodeURIComponent(numPart)}&pageSize=50&orderBy=set.releaseDate`, { headers });
      const data = await res.json();
      const cards = (data.data || []).filter(c => {
        // Also filter by name if one is provided
        if (!q) return true;
        return c.name.toLowerCase().includes(q);
      });

      if (cards.length === 0) {
        resultsEl.innerHTML = '<div id="add-status">No cards found for that number</div>';
        return;
      }
      // Show cards directly as a grid (not pokemon list step)
      resultsEl.innerHTML = `
        <div style="font-size:9px;color:var(--text2);letter-spacing:.12em;margin-bottom:10px">${cards.length} RESULT${cards.length!==1?'S':''} — CLICK A CARD TO ADD IT</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px">
          ${cards.map(card => {
            const pokeId = findPokeIdFromCardName(card.name);
            const owned = pokeId ? getOwned(pokeId).some(c => c.id === card.id) : false;
            return `<div style="background:${owned?'#0c1810':'var(--bg3)'};border:1px solid ${owned?'#253525':'var(--border)'};border-radius:6px;padding:7px;cursor:${owned?'default':'pointer'};text-align:center;position:relative;transition:all .15s"
              onclick="${owned||!pokeId ? '' : `pickPrintingFromSearch('${pokeId}','${card.id}','${(card.name||'').replace(/'/g,"\\'")}','${card.images?.small||''}','${(card.set?.name||'').replace(/'/g,"\\'")}','${card.number||''}')`}"
              title="${owned?'Already owned':pokeId?'Click to add':'Pokémon not in Pokédex'}">
              ${owned ? '<div style="position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--green)"></div>' : ''}
              ${!pokeId ? '<div style="position:absolute;top:4px;left:4px;font-size:7px;color:var(--text3);background:var(--bg);padding:1px 3px;border-radius:2px">N/A</div>' : ''}
              ${card.images?.small ? `<img src="${card.images.small}" style="width:100%;aspect-ratio:2.5/3.5;object-fit:contain;border-radius:3px">` : '<div style="width:100%;aspect-ratio:2.5/3.5;background:var(--bg);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.2">🃏</div>'}
              <div style="font-size:7px;margin-top:4px;color:${owned?'var(--green)':'var(--text2)'};line-height:1.3">${owned?'✓ OWNED':card.name}</div>
              <div style="font-size:7px;color:var(--text3)">${card.set?.name||''} #${card.number||''}</div>
            </div>`;
          }).join('')}
        </div>`;
    } catch {
      resultsEl.innerHTML = '<div id="add-status" style="color:var(--red)">Search failed — check connection</div>';
    }
    return;
  }

  // Name-only search — filter local pokémon list
  if (!q) return;
  const matches = pokemonList.filter(p =>
    p.name.toLowerCase().includes(q) || String(p.id) === q
  ).slice(0, 20);

  document.getElementById('add-status').textContent = '';

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div id="add-status">No Pokémon found</div>';
    return;
  }
  resultsEl.innerHTML = matches.map(p => `
    <div class="add-result-pokemon" onclick="showPrintingsPicker(${p.id})">
      ${p.sprite ? `<img src="${p.sprite}" alt="${p.name}">` : '<div style="width:40px;height:40px;background:var(--bg3);border-radius:4px"></div>'}
      <div>
        <div class="add-result-pokemon-num">#${String(p.id).padStart(4,'0')}</div>
        <div class="add-result-pokemon-name">${p.name}</div>
      </div>
      ${isOwned(p.id) ? '<span style="margin-left:auto;font-size:9px;color:var(--green);letter-spacing:.1em">OWNED</span>' : ''}
    </div>
  `).join('');
}

async function showPrintingsPicker(pokeId) {
  const p = pokemonList.find(x => x.id === pokeId);
  if (!p) return;
  addCardTarget = p;

  document.getElementById('add-results').style.display = 'none';
  document.getElementById('add-printings-wrap').style.display = 'block';
  document.getElementById('add-printings-title').textContent = p.name.toUpperCase() + ' — SELECT A PRINTING';
  document.getElementById('add-printings-grid').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);font-size:10px;letter-spacing:.15em"><span class="spinner"></span>LOADING...</div>';

  try {
    const headers = {}; if (apiKey) headers['X-Api-Key'] = apiKey;
    const res = await fetch(`${TCG_BASE}/cards?q=name:"${encodeURIComponent(p.name.split(' ')[0])}"&pageSize=250&orderBy=set.releaseDate`, { headers });
    const data = await res.json();
    const cards = data.data || [];
    const ownedIds = new Set(getOwned(p.id).map(c => c.id));

    if (cards.length === 0) {
      document.getElementById('add-printings-grid').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text3);font-size:10px">No printings found</div>';
      return;
    }

    document.getElementById('add-printings-grid').innerHTML = cards.map(card => {
      const owned = ownedIds.has(card.id);
      return `<div style="background:${owned?'#0c1810':'var(--bg3)'};border:1px solid ${owned?'#253525':'var(--border)'};border-radius:6px;padding:7px;cursor:pointer;text-align:center;position:relative;transition:all .15s"
        onclick="${owned ? '' : `pickPrinting('${p.id}','${card.id}','${(card.name||'').replace(/'/g,"\\'")}','${card.images?.small||''}','${(card.set?.name||'').replace(/'/g,"\\'")}','${card.number||''}')`}"
        title="${owned ? 'Already owned' : 'Click to add'}">
        ${owned ? '<div style="position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--green)"></div>' : ''}
        ${card.images?.small ? `<img src="${card.images.small}" style="width:100%;aspect-ratio:2.5/3.5;object-fit:contain;border-radius:3px;${owned?'':'opacity:.85'}">` : '<div style="width:100%;aspect-ratio:2.5/3.5;background:var(--bg);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.2">🃏</div>'}
        <div style="font-size:7px;margin-top:4px;color:${owned?'var(--green)':'var(--text2)'};line-height:1.3">${owned?'✓ OWNED':card.set?.name||''}</div>
        <div style="font-size:7px;color:var(--text3)">#${card.number||''}</div>
      </div>`;
    }).join('');
  } catch {
    document.getElementById('add-printings-grid').innerHTML = '<div style="text-align:center;padding:32px;color:var(--red);font-size:10px">Failed to load. Check connection.</div>';
  }
}

function pickPrinting(pokeId, cardId, name, image, set, number) {
  showConfirm(pokeId, cardId, name, image, set, number, (pid) => {
    showPrintingsPicker(parseInt(pid));
  });
}

function findPokeIdFromCardName(cardName) {
  // Try to match card name to a pokemon in our list
  const name = cardName.split(' ')[0].toLowerCase();
  const match = pokemonList.find(p => p.name.toLowerCase() === name || p.name.toLowerCase().startsWith(name));
  return match ? match.id : null;
}

function pickPrintingFromSearch(pokeId, cardId, name, image, set, number) {
  showConfirm(parseInt(pokeId), cardId, name, image, set, number, () => {
    searchAddCard();
  });
}


function showAddResults() {
  document.getElementById('add-results').style.display = 'block';
  document.getElementById('add-printings-wrap').style.display = 'none';
}

// ── Sets ──────────────────────────────────────────────────────────────────────
const SETS_STORAGE = 'sgc_sets_meta';      // { pinned: [], hidden: [] }
const SET_CARDS_STORAGE = 'sgc_set_cards'; // { setId: [cardIds owned] }

let allSets = [];
let setsMeta = { pinned: [], hidden: [] };
let setCardsCache = {}; // setId -> full card list from API
let showHidden = false;
let currentSet = null;

function loadSetsMeta() {
  try { setsMeta = JSON.parse(localStorage.getItem(SETS_STORAGE) || '{"pinned":[],"hidden":[]}'); } catch { setsMeta = { pinned: [], hidden: [] }; }
}
function saveSetsMeta() { localStorage.setItem(SETS_STORAGE, JSON.stringify(setsMeta)); }

// Check if a card is owned in a set (by card id stored in main collection)
function isCardOwnedInSet(cardId) {
  return Object.values(collection).some(p => p.owned?.some(c => c.id === cardId));
}

function getSetOwnedCount(setId, cards) {
  if (!cards) return 0;
  return cards.filter(c => isCardOwnedInSet(c.id)).length;
}

async function loadAllSets() {
  const setsGrid = document.getElementById('sets-grid');
  setsGrid.innerHTML = '<div class="empty-state"><span class="spinner"></span>LOADING SETS...</div>';
  try {
    const headers = {}; if (apiKey) headers['X-Api-Key'] = apiKey;
    const res = await fetch(`${TCG_BASE}/sets?orderBy=-releaseDate&pageSize=500`, { headers });
    const data = await res.json();
    allSets = data.data || [];
    renderSetsGrid();
  } catch {
    setsGrid.innerHTML = '<div class="empty-state" style="color:var(--red)">Failed to load sets. Check connection.</div>';
  }
}

function renderSetsGrid() {
  const q = document.getElementById('sets-search').value.toLowerCase();
  const setsGrid = document.getElementById('sets-grid');

  let sets = allSets.filter(s => {
    if (!showHidden && setsMeta.hidden.includes(s.id)) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.series?.toLowerCase().includes(q)) return false;
    return true;
  });

  // Pinned float to top
  const pinned = sets.filter(s => setsMeta.pinned.includes(s.id));
  const rest = sets.filter(s => !setsMeta.pinned.includes(s.id));
  sets = [...pinned, ...rest];

  if (sets.length === 0) {
    setsGrid.innerHTML = '<div class="empty-state">NO SETS FOUND</div>';
    return;
  }

  setsGrid.innerHTML = sets.map(s => {
    const isPinned = setsMeta.pinned.includes(s.id);
    const isHidden = setsMeta.hidden.includes(s.id);
    const cachedCards = setCardsCache[s.id];
    const owned = cachedCards ? getSetOwnedCount(s.id, cachedCards) : 0;
    const total = s.total || s.printedTotal || '?';
    const pct = cachedCards && total !== '?' ? (owned / total * 100) : 0;
    const complete = cachedCards && owned >= total && total !== '?';

    return `<div class="set-card ${complete ? 'complete' : ''} ${isPinned ? 'pinned' : ''}" onclick="openSetDetail('${s.id}')">
      <div class="set-card-logo-wrap">
        ${s.images?.logo ? `<img class="set-card-logo" src="${s.images.logo}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'">` : `<div class="set-card-logo-placeholder">🃏</div>`}
        <button class="set-pin-btn ${isPinned ? 'pinned' : ''}" onclick="event.stopPropagation();togglePin('${s.id}')" title="${isPinned ? 'Unpin' : 'Pin'}">📌</button>
        <button class="set-hide-btn" onclick="event.stopPropagation();toggleHide('${s.id}')" title="${isHidden ? 'Unhide' : 'Hide'}">✕</button>
      </div>
      <div class="set-card-body">
        <div class="set-card-name">${s.name}</div>
        <div class="set-card-meta">${s.series || ''} · ${s.releaseDate || ''}</div>
        <div class="set-progress-bar"><div class="set-progress-fill" style="width:${pct}%"></div></div>
        <div class="set-progress-text">
          <span>${cachedCards ? owned + ' / ' + total : '— / ' + total}</span>
          ${complete ? '<span class="set-complete-badge">✓ COMPLETE</span>' : ''}
        </div>
      </div>
      ${isPinned ? '<div class="set-pinned-badge">PINNED</div>' : ''}
    </div>`;
  }).join('');
}

function togglePin(setId) {
  const idx = setsMeta.pinned.indexOf(setId);
  if (idx > -1) setsMeta.pinned.splice(idx, 1);
  else setsMeta.pinned.push(setId);
  saveSetsMeta();
  renderSetsGrid();
}

function toggleHide(setId) {
  const idx = setsMeta.hidden.indexOf(setId);
  if (idx > -1) setsMeta.hidden.splice(idx, 1);
  else {
    setsMeta.hidden.push(setId);
    // Also unpin if hiding
    const pinIdx = setsMeta.pinned.indexOf(setId);
    if (pinIdx > -1) setsMeta.pinned.splice(pinIdx, 1);
  }
  saveSetsMeta();
  renderSetsGrid();
}

function toggleShowHidden() {
  showHidden = !showHidden;
  const btn = document.getElementById('sets-show-hidden-btn');
  btn.textContent = showHidden ? 'HIDE HIDDEN' : 'SHOW HIDDEN';
  btn.classList.toggle('active', showHidden);
  renderSetsGrid();
}

async function openSetDetail(setId) {
  const set = allSets.find(s => s.id === setId);
  if (!set) return;
  currentSet = set;

  document.getElementById('set-detail-name').textContent = set.name.toUpperCase();
  document.getElementById('set-detail-meta').textContent = (set.series || '') + (set.releaseDate ? '  ·  ' + set.releaseDate : '');
  const logoEl = document.getElementById('set-detail-logo');
  if (set.images?.logo) { logoEl.src = set.images.logo; logoEl.style.display = 'block'; }
  else logoEl.style.display = 'none';

  document.getElementById('set-detail').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('set-detail-cards').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text3);font-size:11px;letter-spacing:.15em"><span class="spinner"></span>LOADING CARDS...</div>';
  updateSetDetailProgress(set, []);

  try {
    let cards = setCardsCache[setId];
    if (!cards) {
      const headers = {}; if (apiKey) headers['X-Api-Key'] = apiKey;
      const res = await fetch(`${TCG_BASE}/cards?q=set.id:${setId}&pageSize=500&orderBy=number`, { headers });
      const data = await res.json();
      cards = data.data || [];
      setCardsCache[setId] = cards;
    }
    updateSetDetailProgress(set, cards);
    renderSetCards(set, cards);
    // Also refresh the sets grid card count
    renderSetsGrid();
  } catch {
    document.getElementById('set-detail-cards').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--red);font-size:11px">Failed to load cards. Check connection.</div>';
  }
}

function updateSetDetailProgress(set, cards) {
  const total = set.total || set.printedTotal || cards.length || 0;
  const owned = getSetOwnedCount(set.id, cards);
  const pct = total > 0 ? (owned / total * 100).toFixed(0) : 0;
  document.getElementById('set-detail-progress-text').textContent = owned + ' / ' + total;
  document.getElementById('set-detail-pct').textContent = pct + '%';
  document.getElementById('set-detail-bar').style.width = pct + '%';
}

function renderSetCards(set, cards) {
  const container = document.getElementById('set-detail-cards');
  if (cards.length === 0) {
    container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--text3);font-size:11px">No cards found for this set.</div>';
    return;
  }
  // Sort numerically — handles "001", "10", "GG01", "TG15" etc.
  const sorted = [...cards].sort((a, b) => {
    const numA = parseInt((a.number || '').replace(/\D/g, '')) || 0;
    const numB = parseInt((b.number || '').replace(/\D/g, '')) || 0;
    if (numA !== numB) return numA - numB;
    return (a.number || '').localeCompare(b.number || '');
  });
  container.innerHTML = sorted.map(card => {
    const owned = isCardOwnedInSet(card.id);
    const img = card.images?.small;
    return `<div class="set-card-item ${owned ? 'owned' : ''}" id="sci-${card.id}"
      onclick="${owned ? `removeSetCard('${set.id}','${card.id}')` : `confirmSetCard('${set.id}','${card.id}','${(card.name||'').replace(/'/g,"\\'")}','${img||''}','${(set.name||'').replace(/'/g,"\\'")}','${card.number||''}')`}"
      title="${owned ? 'Click to remove' : 'Click to add'}">
      ${owned ? '<div class="set-owned-dot"></div>' : '<div class="set-lock">🔒</div>'}
      <div class="set-card-item-num">#${card.number || '?'}</div>
      ${img ? `<img src="${img}" alt="${card.name}" class="${owned ? '' : 'locked-img'}" loading="lazy">` : `<div style="width:100%;aspect-ratio:2.5/3.5;background:var(--bg3);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:.15">🃏</div>`}
      <div class="set-card-item-name">${card.name}</div>
      ${owned ? `<button class="set-remove-btn" onclick="event.stopPropagation();removeSetCard('${set.id}','${card.id}')">REMOVE</button>` : ''}
    </div>`;
  }).join('');
}

function confirmSetCard(setId, cardId, name, image, setName, number) {
  // Find the pokemon id for this card
  const pokeId = findPokeIdFromCardName(name) || 0;
  showConfirm(pokeId, cardId, name, image, setName, number, (pid) => {
    // If we found a matching pokemon, it was already added to collection via confirmAdd
    // If not (trainer cards etc), add a placeholder to collection under id 0
    if (!pid || pid === 0) {
      // Store trainer/energy cards under a special key
      if (!collection['_misc']) collection['_misc'] = { owned: [], display: null };
      if (!collection['_misc'].owned.find(c => c.id === cardId)) {
        collection['_misc'].owned.push({ id: cardId, name, image, set: setName, number });
        saveData();
      }
    }
    // Refresh set detail UI
    const cards = setCardsCache[setId];
    if (cards) {
      renderSetCards(currentSet, cards);
      updateSetDetailProgress(currentSet, cards);
      renderSetsGrid();
    }
  });
}

function removeSetCard(setId, cardId) {
  // Remove from all pokemon in collection
  Object.keys(collection).forEach(pid => {
    if (collection[pid]?.owned?.some(c => c.id === cardId)) {
      removeCard(pid, cardId);
    }
  });
  renderGrid();
  const cards = setCardsCache[setId];
  if (cards && currentSet) {
    renderSetCards(currentSet, cards);
    updateSetDetailProgress(currentSet, cards);
    renderSetsGrid();
  }
  showToast('Card removed', 'error');
}

function closeSetDetail() {
  document.getElementById('set-detail').classList.remove('open');
  document.body.style.overflow = '';
  currentSet = null;
}

// ── Binder ───────────────────────────────────────────────────────────────────
function renderBinder() {
  const cols = parseInt(document.getElementById('binder-cols').value);
  const rows = parseInt(document.getElementById('binder-rows').value);
  const perPage = cols * rows;
  document.getElementById('binder-info').textContent = cols + '×' + rows + ' = ' + perPage + ' cards/page';

  const ownedPokemon = pokemonList.filter(p => isOwned(p.id));
  const tbody = document.getElementById('binder-tbody');
  if (ownedPokemon.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text3)">No cards owned yet</td></tr>';
    return;
  }
  tbody.innerHTML = ownedPokemon.map((p, i) => {
    const page = Math.floor(i / perPage) + 1;
    const slot = (i % perPage) + 1;
    return `<tr>
      <td style="color:var(--text3)">#${String(p.id).padStart(4,'0')}</td>
      <td style="color:var(--text)">${p.name}</td>
      <td style="color:var(--green)">✓ ${getOwned(p.id).length} card${getOwned(p.id).length !== 1 ? 's' : ''}</td>
      <td style="color:var(--gold)">${page}</td>
      <td style="color:var(--text2)">${slot}</td>
    </tr>`;
  }).join('');
}

// ── Settings ─────────────────────────────────────────────────────────────────
function saveApiKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  localStorage.setItem(API_KEY_STORAGE, apiKey);
  showToast('API key saved!', 'success');
}
function renderStats() {
  const owned = ownedCount();
  const totalPrintings = Object.values(collection).reduce((s,v) => s + (v.owned?.length||0), 0);
  const pct = (owned/TOTAL*100).toFixed(1);
  document.getElementById('stats-display').innerHTML = `
    <div>Pokémon Owned: <span class="stats-val">${owned}</span></div>
    <div>Total Printings: <span class="stats-val">${totalPrintings}</span></div>
    <div>Completion: <span class="stats-val">${pct}%</span></div>
  `;
}
function resetCollection() {
  if (!confirm('Reset entire collection? This cannot be undone.')) return;
  collection = {};
  saveData();
  renderGrid();
  showToast('Collection reset', 'error');
}

// ── Export ───────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Pokedex #','Name','Owned','Printings Owned','Display Card ID']];
  pokemonList.forEach(p => {
    rows.push([p.id, p.name, isOwned(p.id)?'Yes':'No', getOwned(p.id).map(c=>c.name).join('; '), getDisplay(p.id)||'']);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  dl(new Blob([csv],{type:'text/csv'}), 'pokedex_collection.csv');
}
function exportJSON() {
  const out = pokemonList.map(p => ({ id:p.id, name:p.name, owned:getOwned(p.id), display:getDisplay(p.id) }));
  dl(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}), 'pokedex_collection.json');
}
function dl(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Load Pokémon list ─────────────────────────────────────────────────────────
async function loadPokemonList() {
  document.getElementById('grid').innerHTML = '<div class="empty-state"><span class="spinner"></span>LOADING POKÉDEX...</div>';
  try {
    const res = await fetch(`${POKEAPI_BASE}/pokemon?limit=${TOTAL}&offset=0`);
    const data = await res.json();
    pokemonList = data.results.map((p, i) => ({
      id: i + 1,
      name: p.name.charAt(0).toUpperCase() + p.name.slice(1).replace(/-/g,' '),
      sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`
    }));
  } catch {
    pokemonList = Array.from({length:TOTAL}, (_,i) => ({ id:i+1, name:`Pokémon #${i+1}`, sprite: null }));
  }
  renderGrid();
  updateProgress();
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadData();
loadSetsMeta();
loadPokemonList();
</script>
